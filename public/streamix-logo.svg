<svg width="400" height="160" viewBox="0 0 400 160" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Streamix Logo</title>
  <defs>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="400" height="160" rx="16" fill="#111"/>

  <!-- Left red bar -->
  <rect x="0" y="0" width="10" height="160" rx="4" fill="url(#grd)"/>

  <!-- Play triangle -->
  <polygon points="28,45 28,105 72,75" fill="url(#grd)"/>

  <!-- STREA text -->
  <text x="88" y="98" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="2" fill="white">STREA</text>

  <!-- MIX text in red -->
  <text x="283" y="98" font-family="Arial Black, Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="2" fill="url(#grd)">MIX</text>

  <!-- Tagline -->
  <text x="200" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaa" letter-spacing="4">WATCH WITHOUT LIMITS</text>
</svg>
